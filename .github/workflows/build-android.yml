name: Build Android AAB (Signed)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_note:
        description: 'Nota da versão (ex: Correção Edge-to-Edge)'
        required: false
        default: 'Build manual'

jobs:
  build:
    name: Build signed AAB
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Código ────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ─── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. Instalar dependências e fazer build web ───────────────
      - name: Instalar dependências
        run: npm ci

      - name: Build web (React/Vite)
        run: npm run build
        env:
          NODE_ENV: production

      # ─── 4. Copiar assets web para o Android ─────────────────────
      # Substitui o "npx cap sync" — copia o dist/public para o projeto Android
      - name: Sincronizar assets web com Capacitor Android
        run: |
          mkdir -p android/app/src/main/assets/public
          rm -rf android/app/src/main/assets/public/*
          cp -r dist/public/. android/app/src/main/assets/public/
          echo "✅ Assets copiados para android/app/src/main/assets/public/"
          ls android/app/src/main/assets/public/ | head -10

      # ─── 5. JDK 21 ───────────────────────────────────────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ─── 6. Android SDK ──────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── 7. Restaurar keystore a partir do Secret ─────────────────
      - name: Restaurar keystore de assinatura
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.p12
          echo "✅ Keystore restaurada"

      # ─── 8. Criar keystore.properties ────────────────────────────
      - name: Criar android/keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.p12
          storeType=PKCS12
          EOF
          echo "✅ keystore.properties criado"

      # ─── 9. Cachear Gradle ────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 10. Dar permissão ao Gradlew ────────────────────────────
      - name: Permissão Gradlew
        run: chmod +x android/gradlew

      # ─── 11. Build AAB assinado ──────────────────────────────────
      - name: Build AAB de produção (signed release)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true"

      # ─── 12. Verificar AAB gerado ────────────────────────────────
      - name: Verificar AAB
        run: |
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            SIZE=$(du -sh "$AAB_PATH" | cut -f1)
            echo "✅ AAB gerado com sucesso!"
            echo "📦 Tamanho: $SIZE"
            echo "📂 Caminho: $AAB_PATH"
          else
            echo "❌ AAB não encontrado!"
            exit 1
          fi

      # ─── 13. Upload do AAB como artifact ─────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: biblia-inteligente-aab-v${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ─── 14. Criar Release no GitHub (apenas em tags v*) ─────────
      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/app-release.aab
          name: "Bíblia Inteligente ${{ github.ref_name }}"
          body: |
            ## AAB para o Google Play

            **Como usar:**
            1. Baixe o arquivo `app-release.aab` abaixo
            2. Acesse o [Google Play Console](https://play.google.com/console)
            3. Vá em Produção → Criar nova versão
            4. Faça upload do AAB
            5. Publique

            **Assinado com:** upload-keystore.p12 (alias: upload)
