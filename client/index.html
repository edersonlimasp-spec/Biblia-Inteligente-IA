<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Bíblia com textos em Hebraico e Grego, dicionário Strong integrado e IA Professor Teológico para estudos profundos das escrituras." />
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1A5299" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Bíblia Inteligente IA" />
    
    <!-- Apple iOS Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bíblia IA" />
    <link rel="apple-touch-icon" href="/pwa-icons/icon-bible-192.png" />
    <link rel="apple-touch-startup-image" href="/splash-screen.png" />
    
    <!-- Standard Icons (renamed to bypass aggressive favicon caches in embedded/car browsers) -->
    <link rel="icon" type="image/x-icon" href="/favicon-bible.ico" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-bible.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icons/icon-bible-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-icons/icon-bible-512.png" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Bíblia Inteligente IA" />
    <meta property="og:description" content="Bíblia com textos em Hebraico e Grego, dicionário Strong integrado e IA Professor Teológico" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-icons/icon-bible-512.png" />
    
    <!-- Fonts: loaded async to not block iOS WebView rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>

    <!-- Prevent black flash on iOS WebView; brand-colored fallback ensures user NEVER sees black screen -->
    <style>
      html,body,#root{background:#1A5299;margin:0;padding:0;height:100%;width:100%;}
      .__boot_fallback{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1A5299;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center;padding:20px;z-index:1;}
      .__boot_fallback h1{font-size:28px;font-weight:600;margin:0 0 10px;letter-spacing:-0.5px;}
      .__boot_fallback p{font-size:15px;opacity:0.85;margin:6px 0;}
      .__boot_spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:__boot_spin 0.9s linear infinite;margin:24px 0 14px;}
      @keyframes __boot_spin{to{transform:rotate(360deg);}}
    </style>
    
    <title>Bíblia Inteligente IA – Hebraico, Grego e Professor Teológico</title>
  </head>
  <body>
    <div id="root">
      <div class="__boot_fallback" id="__boot_fallback">
        <h1>Bíblia Inteligente IA</h1>
        <div class="__boot_spinner"></div>
        <p>Carregando aplicação...</p>
        <p style="font-size:12px;opacity:0.6;margin-top:18px;">Hebraico • Grego • Professor Teológico</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
