workflows:
  ios-testflight:
    name: iOS – Build & TestFlight (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic_app_store_connect

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bibliainteligente.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bibliainteligente.app"
        APP_STORE_APPLE_ID: "" # opcional: preencher com o Apple ID numérico do app (achar em App Store Connect → App Information → Apple ID)
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'ios-v*'
          include: true

    scripts:
      - name: Instalar dependências npm
        script: |
          npm ci

      - name: Build do bundle web (Vite)
        script: |
          npm run build
          test -f dist/public/index.html || (echo "ERRO: dist/public/index.html não foi gerado" && exit 1)

      - name: Sincronizar somente iOS (Android NÃO é tocado)
        script: |
          npx cap sync ios

      - name: pod install
        script: |
          cd ios/App
          pod install --repo-update

      - name: Definir build number a partir do App Store Connect
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          NEW=$((LATEST + 1))
          echo "Novo CFBundleVersion: $NEW"
          cd ios/App
          agvtool new-version -all $NEW

      - name: Archive iOS (Release)
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM.zip

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        # Para promover automaticamente para revisão pública da App Store, descomente:
        # submit_to_app_store: false
      email:
        recipients:
          - admin@meuapp.com
        notify:
          success: true
          failure: true
